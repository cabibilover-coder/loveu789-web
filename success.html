<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Loveu789 — ลงทะเบียนสำเร็จ!</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #080810;
      --card: #13131f;
      --gold: #f0c040;
      --gold2: #ffd966;
      --purple: #c9a8ff;
      --purple2: #a078e8;
      --purple-dark: #1a1030;
      --text: #f0ecff;
      --muted: #7a6f9a;
      --border: #2a2040;
      --glow-gold: rgba(240,192,64,0.35);
      --glow-purple: rgba(160,120,232,0.3);
      --green: #2ecc71;
      --glow-green: rgba(46,204,113,0.3);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* BG ORBS */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.15;
      animation: orbFloat 10s ease-in-out infinite;
      pointer-events: none;
    }
    .orb1 { width:500px;height:500px;background:var(--purple2);top:-150px;left:-150px; }
    .orb2 { width:400px;height:400px;background:var(--gold);bottom:-100px;right:-100px;animation-delay:-5s; }
    @keyframes orbFloat {
      0%,100% { transform:translate(0,0); }
      50%      { transform:translate(20px,-30px); }
    }

    /* STARS */
    .stars { position:fixed; inset:0; pointer-events:none; z-index:0; }
    .star {
      position:absolute; background:#fff; border-radius:50%;
      animation: twinkle var(--d,3s) ease-in-out infinite;
      opacity:0;
    }
    @keyframes twinkle {
      0%,100%{opacity:0;transform:scale(0.5)}
      50%{opacity:0.6;transform:scale(1)}
    }

    /* CONFETTI */
    .confetti-wrap { position:fixed; inset:0; pointer-events:none; z-index:10; overflow:hidden; }
    .confetti-piece {
      position:absolute;
      top:-20px;
      width:10px; height:10px;
      border-radius:2px;
      animation: confettiFall var(--dur,4s) var(--delay,0s) ease-in both;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity:1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity:0; }
    }

    /* MAIN CARD */
    .card {
      position: relative;
      z-index: 5;
      background: var(--card);
      border: 1px solid var(--border);
      padding: 3.5rem 3rem;
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow: 0 0 80px rgba(0,0,0,0.6), 0 0 40px var(--glow-purple);
      animation: popIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes popIn {
      from { opacity:0; transform:scale(0.8) translateY(40px); }
      to   { opacity:1; transform:scale(1) translateY(0); }
    }

    /* TOP ACCENT LINE */
    .card::before {
      content:'';
      position:absolute;
      top:0;left:0;right:0;
      height:3px;
      background: linear-gradient(90deg, var(--gold), var(--purple2), var(--gold));
    }

    /* SUCCESS ICON */
    .success-ring {
      width: 100px; height: 100px;
      border-radius: 50%;
      border: 3px solid var(--green);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.8rem;
      position: relative;
      box-shadow: 0 0 30px var(--glow-green), inset 0 0 20px rgba(46,204,113,0.1);
      animation: ringPulse 2s ease-in-out infinite;
    }
    @keyframes ringPulse {
      0%,100% { box-shadow: 0 0 30px var(--glow-green), inset 0 0 20px rgba(46,204,113,0.1); }
      50%      { box-shadow: 0 0 50px var(--glow-green), inset 0 0 30px rgba(46,204,113,0.2); }
    }

    .success-check {
      font-size: 3rem;
      animation: checkBounce 0.6s 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes checkBounce {
      from { opacity:0; transform:scale(0); }
      to   { opacity:1; transform:scale(1); }
    }

    .success-title {
      font-family: 'Orbitron', monospace;
      font-size: 1.5rem;
      font-weight: 900;
      background: linear-gradient(90deg, var(--gold), var(--gold2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 10px var(--glow-gold));
      margin-bottom: 0.6rem;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    .success-sub {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 2rem;
      animation: fadeUp 0.6s 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* DIVIDER */
    .divider {
      height:1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 1.8rem 0;
    }

    /* CONTACT SECTION */
    .contact-label {
      font-family: 'Orbitron', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 1rem;
      animation: fadeUp 0.6s 0.5s ease both;
    }

    .contact-desc {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.6s 0.55s ease both;
    }

    .contact-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      width: 100%;
      padding: 1rem 1.5rem;
      background: linear-gradient(135deg, #06c755, #04a844);
      color: #fff;
      border: none;
      font-family: 'Sarabun', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.25s;
      box-shadow: 0 4px 20px rgba(6,199,85,0.3);
      text-decoration: none;
      animation: fadeUp 0.6s 0.6s ease both;
    }
    .contact-btn:hover {
      filter: brightness(1.1);
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(6,199,85,0.45);
    }

    .line-icon { font-size: 1.4rem; }
    .line-text { display:flex; flex-direction:column; align-items:flex-start; line-height:1.2; }
    .line-text small { font-size:0.72rem; opacity:0.85; }

    /* BACK BTN */
    .back-btn {
      display: inline-block;
      margin-top: 1.5rem;
      color: var(--muted);
      font-size: 0.82rem;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: color 0.2s;
      animation: fadeUp 0.6s 0.7s ease both;
      background: none;
      border: none;
      font-family: 'Sarabun', sans-serif;
    }
    .back-btn:hover { color: var(--purple); }

    /* LOGO */
    .logo {
      font-family: 'Orbitron', monospace;
      font-size: 1rem;
      font-weight: 900;
      background: linear-gradient(90deg, var(--gold), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 2rem;
      letter-spacing: 0.15em;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    /* USER INFO BOX */
    .user-box {
      background: var(--purple-dark);
      border: 1px solid var(--border);
      padding: 1rem 1.5rem;
      margin-bottom: 1.8rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      text-align: left;
      animation: fadeUp 0.6s 0.45s ease both;
    }
    .user-avatar { font-size: 2rem; }
    .user-name { font-family:'Orbitron',monospace; font-size:0.85rem; color:var(--gold); }
    .user-status { font-size:0.75rem; color:var(--green); margin-top:0.2rem; }

    @media (max-width: 480px) {
      .card { padding: 2.5rem 1.5rem; }
    }
  </style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="stars" id="stars"></div>
<div class="confetti-wrap" id="confetti"></div>

<div class="card">
  <div class="logo">LOVEU789</div>

  <div class="success-ring">
    <span class="success-check">✓</span>
  </div>

  <div class="success-title">ลงทะเบียนสำเร็จ!</div>
  <p class="success-sub">ยินดีต้อนรับเข้าสู่ LOVEU789 🎮<br/>ไอดีของคุณพร้อมใช้งานแล้ว</p>

  <div class="user-box">
    <div class="user-avatar">🎮</div>
    <div>
      <div class="user-name">สมาชิกใหม่</div>
      <div class="user-status">● บัญชีได้รับการยืนยันแล้ว</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="contact-label">📲 ช่องทางเข้าเล่น</div>
  <p class="contact-desc">ติดต่อแอดมินผ่าน LINE เพื่อรับลิงก์เข้าเล่นและสิทธิพิเศษสำหรับสมาชิกใหม่</p>

  <a id="lineBtn" class="contact-btn" style="border:none;cursor:pointer;background:inherit;">
    <span class="line-icon">💬</span>
    <span class="line-text">
      <span>ติดต่อแอดมิน LINE</span>
      <small id="lineId">กดเพื่อเพิ่มเพื่อน</small>
    </span>
    <span style="margin-left:auto;font-size:1rem;opacity:0.8">→</span>
  </a>

  <button class="back-btn" onclick="history.back()">← กลับหน้าหลัก</button>
</div>

<script>
  // Stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 1;
    s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;animation-delay:${(Math.random()*5).toFixed(1)}s;`;
    starsEl.appendChild(s);
  }

  // Confetti
  const colors = ['#f0c040','#c9a8ff','#a078e8','#2ecc71','#e74c3c','#3498db','#ffd966'];
  const confWrap = document.getElementById('confetti');
  for (let i = 0; i < 80; i++) {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    c.style.cssText = `
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${Math.random()*10+6}px;
      height:${Math.random()*10+6}px;
      border-radius:${Math.random()>0.5?'50%':'2px'};
      --dur:${(Math.random()*3+3).toFixed(1)}s;
      --delay:${(Math.random()*2).toFixed(1)}s;
    `;
    confWrap.appendChild(c);
  }

  // ใส่ LINE ID ที่นี่
  const LINE_ID = '';   // ← ใส่ LINE ID ของคุณได้เลย เช่น '@loveu789'
  const LINE_URL = 'https://lovepok789.mssg.me/';  // ← ใส่ลิงก์ LINE ได้เลย เช่น 'https://line.me/ti/p/~xxxxx'

  if (LINE_ID) document.getElementById('lineId').textContent = LINE_ID;
  if (LINE_URL) document.getElementById('lineBtn').href = LINE_URL;
</script>
</body>
</html>
